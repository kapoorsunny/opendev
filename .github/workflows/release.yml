#
# CI that:
#
# * checks for a Git Tag that looks like a release
# * builds artifacts with dist (archives, installers, hashes)
# * uploads those artifacts to temporary workflow zip
# * on success, uploads the artifacts to a GitHub Release
#
# Note that the GitHub Release will be created with a generated
# title/body based on your changelogs.

name: Release
permissions:
  "contents": "write"

env:
  # Microsandbox version to bundle with OpenDev releases.
  # Update this when upgrading the bundled runtime.
  MSB_VERSION: "0.3.3"

# This task will run whenever you push a git tag that looks like a version
# like "1.0.0", "v0.1.0-prerelease.1", "my-app/0.1.0", "releases/v1.0.0", etc.
# Various formats will be parsed into a VERSION and an optional PACKAGE_NAME, where
# PACKAGE_NAME must be the name of a Cargo package in your workspace, and VERSION
# must be a Cargo-style SemVer Version (must have at least major.minor.patch).
#
# If PACKAGE_NAME is specified, then the announcement will be for that
# package (erroring out if it doesn't have the given version or isn't dist-able).
#
# If PACKAGE_NAME isn't specified, then the announcement will be for all
# (dist-able) packages in the workspace with that version (this mode is
# intended for workspaces with only one dist-able package, or with all dist-able
# packages versioned/released in lockstep).
#
# If you push multiple tags at once, separate instances of this workflow will
# spin up, creating an independent announcement for each one. However, GitHub
# will hard limit this to 3 tags per commit, as it will assume more tags is a
# mistake.
#
# If there's a prerelease-style suffix to the version, then the release(s)
# will be marked as a prerelease.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist-args: cli flags to pass to dist
      # - install-dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install libdbus (Linux)
        if: runner.os == 'Linux'
        run: |
          if command -v apt-get > /dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      # NOTE: this step MUST run before "Post-build". It mutates the .tar.xz
      # archive that `dist build` already hashed, so it recomputes the sha256
      # and rewrites dist-manifest.json and the .sha256 sidecar. Post-build
      # then snapshots the corrected manifest, which the global job uses to
      # generate the shell installer and Homebrew formula. Running this after
      # Post-build is what shipped mismatched checksums in v0.1.7/v0.1.8
      # (issues #41, #84).
      - name: Bundle microsandbox runtime
        if: "!contains(join(matrix.targets, ' '), 'windows') && !contains(join(matrix.targets, ' '), 'x86_64-apple')"
        shell: bash
        run: |
          # Map cargo target triple to microsandbox release platform
          TARGET="${{ join(matrix.targets, ' ') }}"
          case "$TARGET" in
            *aarch64-apple-darwin*)     MSB_PLATFORM="darwin-aarch64"; RUST_TRIPLE="aarch64-apple-darwin" ;;
            *x86_64-unknown-linux-gnu*) MSB_PLATFORM="linux-x86_64";   RUST_TRIPLE="x86_64-unknown-linux-gnu" ;;
            *aarch64-unknown-linux-gnu*)MSB_PLATFORM="linux-aarch64";  RUST_TRIPLE="aarch64-unknown-linux-gnu" ;;
            *) echo "No microsandbox for $TARGET, skipping"; exit 0 ;;
          esac

          echo "Downloading microsandbox v${MSB_VERSION} for ${MSB_PLATFORM}..."
          curl -L --retry 3 \
            "https://github.com/superradcompany/microsandbox/releases/download/v${MSB_VERSION}/microsandbox-${MSB_PLATFORM}.tar.gz" \
            -o msb-release.tar.gz
          mkdir -p msb-extracted
          tar xzf msb-release.tar.gz -C msb-extracted

          # Inject into this job's own cargo-dist archive. The name is pinned
          # to the job's target triple: "Fetch local artifacts" may have
          # downloaded sibling matrix jobs' archives into target/distrib, and
          # a wildcard find could pick (and corrupt) one of those instead.
          ARCHIVE="target/distrib/opendev-cli-${RUST_TRIPLE}.tar.xz"
          if [ ! -f "$ARCHIVE" ]; then
            echo "No archive at $ARCHIVE, skipping microsandbox bundle"
            exit 0
          fi
          echo "Injecting microsandbox into $ARCHIVE..."

          sha256_of() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1" | awk '{print $1}'
            else
              shasum -a 256 "$1" | awk '{print $1}'
            fi
          }
          OLD_SHA=$(sha256_of "$ARCHIVE")

          WORKDIR=$(mktemp -d)
          tar xf "$ARCHIVE" -C "$WORKDIR"
          INNER=$(ls "$WORKDIR")

          # Place runtime files inside the archive
          mkdir -p "$WORKDIR/$INNER/runtime/msb/bin" "$WORKDIR/$INNER/runtime/msb/lib"
          cp msb-extracted/bin/* "$WORKDIR/$INNER/runtime/msb/bin/" 2>/dev/null || true
          cp msb-extracted/lib/* "$WORKDIR/$INNER/runtime/msb/lib/" 2>/dev/null || true

          # Re-archive with xz compression
          (cd "$WORKDIR" && tar cf - "$INNER") | xz > "$ARCHIVE"
          rm -rf "$WORKDIR" msb-extracted msb-release.tar.gz

          # The archive bytes changed, so the sha256 recorded by `dist build`
          # is now stale. Rewrite it everywhere it was recorded: the
          # dist-manifest.json (source of truth for the shell installer and
          # Homebrew formula generated by the global job) and the .sha256
          # sidecar that gets uploaded next to the archive.
          NEW_SHA=$(sha256_of "$ARCHIVE")
          echo "Rewriting checksum ${OLD_SHA} -> ${NEW_SHA}"
          for f in dist-manifest.json "${ARCHIVE}.sha256"; do
            if [ -f "$f" ]; then
              sed -i.bak "s/${OLD_SHA}/${NEW_SHA}/g" "$f"
              rm -f "$f.bak"
            fi
          done
          if ! grep -q "$NEW_SHA" dist-manifest.json; then
            echo "ERROR: dist-manifest.json does not contain the recomputed sha256; refusing to publish stale checksums" >&2
            exit 1
          fi

          echo "Bundled microsandbox ${MSB_PLATFORM} into $(basename $ARCHIVE)"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"

      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}
  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    # Only run if we're "publishing", and only if plan, local and global didn't fail (skipped is fine)
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > $RUNNER_TEMP/notes.txt

          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  # Publish Homebrew formula to the tap repo
  publish-homebrew:
    needs:
      - plan
      - host
    if: ${{ always() && needs.host.result == 'success' && needs.plan.outputs.publishing == 'true' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts/
          merge-multiple: true
      - name: Publish formula to tap
        run: |
          # Find the generated Homebrew formula
          FORMULA=$(find artifacts -name "*.rb" | head -1)
          if [ -z "$FORMULA" ]; then
            echo "No Homebrew formula found, skipping"
            exit 0
          fi
          echo "Found formula: $FORMULA"

          # cargo-dist names the generated class after the binary package
          # (`OpendevCli`), but Homebrew requires the class to match the
          # formula filename (`opendev.rb` -> `Opendev`).
          perl -0pi -e 's/^class\s+\w+\s+< Formula$/class Opendev < Formula/m' "$FORMULA"
          grep -q '^class Opendev < Formula$' "$FORMULA"

          # Add the microsandbox runtime as a Homebrew resource.
          #
          # The opendev binary only looks for msb under the Homebrew prefix on
          # macOS (crates/opendev-sandbox resolves ~/.opendev, then
          # `brew --prefix`/libexec on macOS, then PATH), so the resource is
          # only useful — and only fetched/staged — on macOS ARM. It must
          # still be DEFINED at the top level of the formula class on every
          # platform: v0.1.7 injected the definition after the first
          # `sha256 "` line, nesting it inside the macOS-ARM url stanza, and
          # then staged it after EVERY `bin.install`, which raised
          # ResourceMissingError on Linux (issue #41).
          MSB_URL="https://github.com/superradcompany/microsandbox/releases/download/v${MSB_VERSION}/microsandbox-darwin-aarch64.tar.gz"
          curl -sL --retry 3 "$MSB_URL" -o /tmp/msb-darwin.tar.gz
          MSB_SHA=$(sha256sum /tmp/msb-darwin.tar.gz | cut -d' ' -f1)
          rm -f /tmp/msb-darwin.tar.gz

          # Inject the resource definition immediately after the class line so
          # it sits at the top level of the class body on all platforms. The
          # on_macos/on_arm blocks scope the url/sha256 to macOS ARM.
          printf '  resource "microsandbox" do\n    on_macos do\n      on_arm do\n        url "%s"\n        sha256 "%s"\n      end\n    end\n  end\n\n' "$MSB_URL" "$MSB_SHA" > /tmp/msb-resource.rb
          awk '{ print } /^class Opendev < Formula$/ && !done { while ((getline line < "/tmp/msb-resource.rb") > 0) print line; done=1 }' "$FORMULA" > "${FORMULA}.tmp"
          mv "${FORMULA}.tmp" "$FORMULA"
          rm -f /tmp/msb-resource.rb
          grep -q 'resource "microsandbox" do' "$FORMULA"

          # Stage the runtime after installing the binary. The block is
          # runtime-guarded so it only executes on macOS ARM — the only
          # platform where the resource has a url and where the binary looks
          # in the Homebrew prefix — making it safe to insert after every
          # platform's bin.install line.
          sed -i 's|bin\.install "opendev"|bin.install "opendev"\n    if OS.mac? \&\& Hardware::CPU.arm?\n      resource("microsandbox").stage do\n        (libexec/"msb/bin").install Dir["bin/*"]\n        (libexec/"msb/lib").install Dir["lib/*"]\n      end\n    end|' "$FORMULA"
          grep -q 'resource("microsandbox").stage do' "$FORMULA"

          # Fail loudly if the patched formula is not valid Ruby.
          ruby -c "$FORMULA"

          echo "Patched Homebrew formula with microsandbox resource (SHA: ${MSB_SHA})"

          # Clone the tap's canonical branch explicitly to avoid publishing
          # into an unexpected local HEAD state.
          git clone --branch main --single-branch "https://x-access-token:${GH_TOKEN}@github.com/opendev-to/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp "$FORMULA" tap/Formula/opendev.rb
          cd tap
          git rev-parse --verify HEAD
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/opendev.rb
          git commit -m "Update opendev to ${{ needs.plan.outputs.tag }}" || echo "No changes"
          git push origin HEAD:main

  # Post-release integrity gate: download every asset actually published to
  # the GitHub Release and verify its sha256 against everything that claims
  # to know it — the .sha256 sidecars, dist-manifest.json, the shell
  # installer, and the Homebrew tap formula. This is the safety net for the
  # class of bug behind issues #41 and #84 (archives mutated after hashing).
  verify-release:
    needs:
      - plan
      - host
      - publish-homebrew
    if: ${{ always() && needs.host.result == 'success' && needs.publish-homebrew.result == 'success' && needs.plan.outputs.publishing == 'true' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify published asset checksums
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ needs.plan.outputs.tag }}"
          mkdir assets
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" --dir assets
          cd assets
          ls -l

          # The tap formula was just pushed by publish-homebrew; fetch what
          # brew users will actually see.
          if ! curl -fsSL --retry 3 \
              "https://raw.githubusercontent.com/opendev-to/homebrew-tap/main/Formula/opendev.rb" \
              -o tap-formula.rb; then
            echo "::warning::could not fetch tap formula; skipping formula checks"
            rm -f tap-formula.rb
          fi

          fail=0
          for asset in *.tar.xz *.tar.gz *.zip; do
            [ -e "$asset" ] || continue
            actual=$(sha256sum "$asset" | cut -d' ' -f1)
            echo "$asset -> $actual"

            # 1. .sha256 sidecar published next to the asset
            if [ -f "$asset.sha256" ]; then
              expected=$(awk '{print $1}' "$asset.sha256")
              if [ "$expected" != "$actual" ]; then
                echo "::error::$asset: .sha256 sidecar says $expected but asset hashes to $actual"
                fail=1
              fi
            fi

            # 2. dist-manifest.json published with the release
            if [ -f dist-manifest.json ]; then
              manifest_sha=$(jq -r --arg n "$asset" '.artifacts[$n].checksums.sha256 // empty' dist-manifest.json)
              if [ -n "$manifest_sha" ] && [ "$manifest_sha" != "$actual" ]; then
                echo "::error::$asset: dist-manifest.json says $manifest_sha but asset hashes to $actual"
                fail=1
              fi
            fi

            # 3. Shell installer and tap formula: any consumer that mentions
            #    this asset by name must embed its actual sha256.
            for consumer in opendev-cli-installer.sh tap-formula.rb; do
              if [ -f "$consumer" ] && grep -q "$asset" "$consumer"; then
                if ! grep -q "$actual" "$consumer"; then
                  echo "::error::$consumer references $asset but does not contain its actual sha256 $actual"
                  fail=1
                fi
              fi
            done
          done

          if [ "$fail" -ne 0 ]; then
            echo "Published checksums do NOT match published assets (see errors above)."
            exit 1
          fi
          echo "All published checksums match the published assets."

  announce:
    needs:
      - plan
      - host
      - publish-homebrew
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
